{% extends 'base.html' %}

{% block body %}
<div class="home-hero">
    <div class="hero-content">
        <h1>MoMA: <br>The Museum of Modern Art</h1>
        <p>Connecting people from around the world to the art of our time.</p>
    </div>
    <div class="hero-image">
        <img src="{{ url_for('static', filename='image/MOMAIMG.jpg') }}" alt="MoMA">
    </div>
</div>

<div class="home-container">
    <div class="section-header">
        <h2>Top Collection</h2>
        <a href="{{ url_for('art') }}" class="view-all">View All →</a>
    </div>

    <div class="gallery-grid">
        {% for art in all_arts %}
        <div class="art-card">
            <div class="art-image">
                <img src="{{ url_for('static', filename='image/' + art.id|string + '.jpg') }}" alt="{{ art.name }}">
            </div>
            <div class="art-info">
                <h3>{{ art.name }}</h3>
                <p>{{ art.author.name }}</p> 
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
