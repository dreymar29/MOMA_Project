{% extends 'base.html' %}

{% block body %}
<div class="home-hero">
    <div class="hero-content">
        <h1>MoMA: <br>The Museum of Modern Art</h1>
        <p>Connecting people from around the world to the art of our time.</p>
    </div>
    <div class="hero-image">
        <img src="{{ url_for('static', filename='image/MOMAIMG.jpg') }}" alt="MoMA">
    </div>
</div>

<div style="max-width: 1100px; margin: 60px auto; padding: 0 20px; font-family: sans-serif;">
    
    <div style="border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: baseline;">
        <h2 style="font-size: 1.8rem; font-weight: bold; text-transform: uppercase; margin: 0;">Our Collection</h2>
        <a href="{{ url_for('art') }}" style="text-decoration: none; color: #000; font-weight: bold; font-size: 0.8rem;">VIEW ALL →</a>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
        {% for art in all_arts[:3] %}
        <div style="background: #fff; border: 1px solid #eee; transition: 0.3s;">
            <a href="{{ url_for('art_detail', art_id=art.id) }}" style="text-decoration: none; color: inherit;">
                <div style="width: 100%; height: 350px; overflow: hidden;">
                    <img src="{{ url_for('static', filename='image/' + art.id|string + '.jpg') }}" 
                         alt="{{ art.name }}" 
                         style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div style="padding: 20px;">
                    <h3 style="font-size: 1.1rem; margin: 0 0 5px 0; font-weight: bold; text-transform: uppercase;">{{ art.name }}</h3>
                    <p style="font-size: 0.9rem; color: #666; margin: 0;">{{ art.author.name }}</p>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
