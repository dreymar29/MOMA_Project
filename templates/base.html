<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for ('static', filename='css/main.css') }}">
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block head %} {% endblock %}
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <ul class="nav-menu">
                <li><a href="{{ url_for('index') }}"><img src="{{ url_for ('static', filename='image/MOMALOGO.png') }}" class="logo-img"></a></li>
                <li><a href="{{ url_for('about') }}">About</a></li>
                <li><a href="{{ url_for('art') }}">Art</a></li>
                <li><a href="{{ url_for('featured_artist') }}">Artist</a></li>
                <li><a href="{{ url_for('all_reviews') }}">Review</a></li>
            </ul>

            <div class="nav-search">
                <form action="/search" method="GET" id="searchForm">
                    <input type="text" name="q" id="searchInput" placeholder="Search art...">
                    <button type="button" onclick="toggleSearch()" id="searchBtn">⌕</button>
                </form>
            </div>

            <div class="nav-auth">
                <a href="{{ url_for('login') }}" class="login-btn">Login</a>
            </div>
        </div>
    </nav>

    <script>
        function toggleSearch() {
            const form = document.getElementById('searchForm');
            const input = document.getElementById('searchInput');
            form.classList.toggle('active');
            if (form.classList.contains('active')) {
                input.focus();
            } else if (input.value.trim() !== "") {
                form.submit();
            }
        }
    </script>

    {% block body %} {% endblock %}
</body>

</html>
