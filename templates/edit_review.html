{% extends 'base.html' %}
{% block content %}
<div class="home-container">
    <div class="section-header">
        <h2>Edit Review</h2>
    </div>

    <div class="feedback-card" style="max-width: 500px; margin-top: 30px; text-align: left;">
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">Editing review for: <strong>{{ review.art_data.name }}</strong></p>
        
        <form method="POST">
            <div class="rating-wrapper" style="justify-content: flex-start;">
                <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5" {% if review.rating == 5 %}checked{% endif %}/><label for="star5">★</label>
                    <input type="radio" id="star4" name="rating" value="4" {% if review.rating == 4 %}checked{% endif %}/><label for="star4">★</label>
                    <input type="radio" id="star3" name="rating" value="3" {% if review.rating == 3 %}checked{% endif %}/><label for="star3">★</label>
                    <input type="radio" id="star2" name="rating" value="2" {% if review.rating == 2 %}checked{% endif %}/><label for="star2">★</label>
                    <input type="radio" id="star1" name="rating" value="1" {% if review.rating == 1 %}checked{% endif %}/><label for="star1">★</label>
                </div>
            </div>

            <div class="input-group">
                <label>Review Content</label>
                <textarea name="review_art" rows="5" required>{{ review.review_art }}</textarea>
            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn-submit-art">Update Review</button>
                <a href="{{ url_for('profile') }}" style="display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 0.9rem;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
