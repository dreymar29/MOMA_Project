{% extends 'base.html' %}

{% block body %}
<div class="home-container">
<button><a href="{{ url_for('art') }}" style="padding: 5px; color: #007bff;">← Back to Gallery</a></button>

    <title>{{ art.name }} - MoMA Companion</title>

    <div class="row">
        <div class="art-detail-container">
            <img src="{{ url_for('static', filename='image/' + art.id|string + '.jpg') }}" alt="{{ art.name }}" 
                 class="art-img-main img-fluid shadow" 
                 onclick="openZoom()" alt="{{ art.name }}">
        </div>

        <div class="mb-4">
            <audio id="audioGuide">
                <source src="{{ url_for('static', filename='audio/' + art.audio_path) }}" type="audio/mpeg">
            </audio>

            <button class="btn btn-dark me-2" id="audioBtn">
                <span id="audioIcon">🔊</span> <span id="audioText">Play Audio</span>
            </button>
        </div>

        <div class="art-info text-center">
            <h1 class="display-4">{{ art.name }}</h1>
            <h4 class="text-secondary">
                By 
                {% if art.author %}
                    <a href="{{ url_for('artist_detail', artist_id=art.author.id) }}" style="text-decoration: none; color: inherit;">
                        {{ art.author.name }}
                    </a>
                {% else %}
                    Unknown Artist
                {% endif %}
            </h4>
            <hr>

            <div class="mt-3">
                <h5>Description</h5>
                <p class="lead">{{ art.description }}</p>
            </div>

        </div>
    </div>

    <div class="home-container">
        <div class="container">
            <div class="feedback-card">
                <form action="{{ url_for('add_review', art_id=art.id) }}" method="POST" class="review-form">
                <h2 style="margin-top: 0;">Ulasan untuk {{ art.name }}</h2>
                <div class="input-group">
                    <label style="text-align: center;" >Rating Karya:</label>
                    <div class="rating-wrapper">
                    <div class="star-rating">
                        <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
                        <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
                        <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
                        <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
                        <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
                    </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="review_museum">Tulis ulasanmu untuk {{ art.name }} milik {{ art.author.name }} </label>
                    <textarea name="review_museum" id="review_museum" placeholder="Minimal 5 kata." required></textarea>
                </div>
            </form>
            <button type="submit" class="btn-submit-museum">Kirim Ulasan</button>
            </div>
        </div>
    </div>

    <div id="zoomModal" class="zoom-overlay">
        <span class="close-zoom" onclick="closeZoom()">&times;</span>
        <img id="zoomedImg" src="{{ url_for('static', filename='image/' + art.id|string + '.jpg') }}" alt="{{ art.name }}">
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</div>

{% endblock %}
