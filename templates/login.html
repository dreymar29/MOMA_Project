{% extends 'base.html' %}

{% block body %}
<div class="login-wrapper" style="max-width: 400px; margin: 80px auto; padding: 20px; border: 1px solid #333; border-radius: 10px; font-family: sans-serif;">
    <h2 style="text-align: center; text-transform: uppercase; letter-spacing: 2px;">MoMA Login</h2>
    <hr>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p style="color: white; background: #ff4d4d; padding: 10px; border-radius: 5px; text-align: center;">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="POST">
        <div style="margin-bottom: 15px; text-align: center;">
            <label style="margin-right: 15px;">
                <input type="radio" name="role" value="visitor" checked> Visitor
            </label>
            <label>
                <input type="radio" name="role" value="staff"> Staff
            </label>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Username / Name:</label><br>
            <input type="text" name="username" required style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label>Password:</label><br>
            <input type="password" name="password" required style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;">
        </div>

        <button type="submit" style="width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;">
            SIGN IN
        </button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <p>Belum punya akun? <a href="{{ url_for('register') }}" style="color: #007bff; text-decoration: none;">Daftar sebagai Visitor</a></p>
    </div>
</div>
{% endblock %}
