{% extends 'base.html' %}
{% block content %}
<div class="home-container">
    <div class="section-header">
        <h2>The Artists</h2>
    </div>
    
    <div class="artist-grid">
        {% for artist in all_artist %}
        <a href="{{ url_for('artist_detail', artist_id=artist.id) }}" style="text-decoration: none; color: inherit;">
            <div class="artist-card-main">
                <div class="artist-image-wrapper">
                    <img src="{{ url_for('static', filename='image/' + artist.photo_path) if artist.photo_path else 'https://via.placeholder.com/300' }}" 
                         alt="{{ artist.name }}" 
                         style="width: 100%; height: 300px; object-fit: cover; border-radius: 8px;">
                </div>
                <div class="artist-info">
                    <h3>{{ artist.name }}</h3>
                    <p>{{ artist.arts|length }} Works in Collection</p>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
