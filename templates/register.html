{% extends 'base.html' %}

{% block body %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px;">
    
    <div style="width: 100%; max-width: 300px; background: #ffffff; padding: 20px; border: 2px solid #000; box-shadow: 8px 8px 0px #000; font-family: 'Helvetica', Arial, sans-serif;">
        
        <h3 style="text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; font-weight: bold; font-size: 1.1rem;">Register</h3>
        <p style="text-align: center; font-size: 0.6rem; margin-bottom: 15px; color: #666; letter-spacing: 1px;">MUSEUM OF MODERN ART</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

        <form action="{{ url_for('register') }}" method="POST">
            <div style="margin-bottom: 12px;">
                <label style="display: block; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Full Name</label>
                <input type="text" name="name" required style="width: 100%; padding: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 0.9rem; outline: none;">
            </div>

            <div style="margin-bottom: 12px;">
                <label style="display: block; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Gender</label>
                <select name="gender" style="width: 100%; padding: 8px; border: 1px solid #ccc; box-sizing: border-box; background: white; font-size: 0.9rem;">
                    <option value="Female">Female</option>
                    <option value="Male">Male</option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Password</label>
                <input type="password" name="password" required style="width: 100%; padding: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 0.9rem;">
            </div>

            <button type="submit" style="width: 100%; padding: 12px; background: #000; color: #fff; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">
                Create Account
            </button>

            <div style="text-align: center; margin-top: 15px;">
                <p style="font-size: 0.7rem;">Already a visitor? <a href="{{ url_for('login') }}" style="color: #000; font-weight: bold; text-decoration: underline;">Login here</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
